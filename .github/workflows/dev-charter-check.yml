name: Dev Charter

on:
  push:
    branches: [main]
    paths:
      - "docs/dev-charter/VERSION"
  schedule:
    - cron: "40 3 * * 1"
  workflow_dispatch:

jobs:
  check:
    uses: y-marui/dev-charter/.github/workflows/check-charter.yml@main
    permissions:
      contents: write
      pull-requests: write
    with:
      prefix: "docs/dev-charter"
