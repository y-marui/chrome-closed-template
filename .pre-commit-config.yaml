repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: mixed-line-ending
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: no-commit-dotenv
        name: Prevent committing .env files
        language: fail
        entry: ".env files must not be committed"
        files: '\.env(\.|$)'

      - id: no-hardcoded-absolute-paths
        name: No hardcoded absolute paths
        language: pygrep
        entry: '["''`](\/Users\/|\/home\/|\/root\/|[A-Z]:\\)'
        types: [javascript]
